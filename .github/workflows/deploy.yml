name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'

# Prevent concurrent deploys — never cancel an in-flight deploy
concurrency:
  group: deploy-backend
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: wfcts-backend

jobs:
  # ── Job 1: Build Docker image and push to ECR ──────────────────────────────
  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          # Tag with git SHA (immutable) and latest
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          # GitHub Actions layer cache — node_modules layer reused if package.json unchanged
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # ── Job 2: Pull new image on EC2 and restart container ────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail

            IMAGE="${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"

            echo "==> Authenticating with ECR"
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            echo "==> Pulling $IMAGE"
            docker pull "$IMAGE"

            echo "==> Swapping container"
            docker stop wfcts-backend 2>/dev/null || true
            docker rm   wfcts-backend 2>/dev/null || true

            docker run -d \
              --name wfcts-backend \
              --restart always \
              -p 3000:3000 \
              --env-file ~/app/.env \
              -v wfcts-uploads:/app/public/uploads \
              "$IMAGE"

            echo "==> Health check"
            for i in 1 2 3 4 5; do
              sleep 5
              curl -sf http://localhost:3000/api/health && break
              [ "$i" -eq 5 ] && { echo "Health check failed — rolling back"; docker stop wfcts-backend; exit 1; }
            done

            echo "==> Pruning old images (keeps last 72 h)"
            docker image prune -af --filter "until=72h" || true

            echo "Deployed ${{ github.sha }} successfully"
