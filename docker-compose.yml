# Local development — runs only the backend container.
# Frontend runs separately: cd frontend && npm run dev
services:
  backend:
    build: ./backend
    container_name: wfcts-backend-local
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/public/uploads:/app/public/uploads
    restart: unless-stopped
